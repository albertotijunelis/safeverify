name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v1.0.4)"
        required: true

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = if ("${{ github.event.inputs.tag }}") { "${{ github.event.inputs.tag }}" } else { "${{ github.ref_name }}" }
          $ver = $tag -replace '^v',''
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # Build PyInstaller from source to compile a fresh bootloader.
          # The pre-built bootloader binary is widely fingerprinted by AV engines;
          # compiling from C source on the runner produces a unique signature.
          python -m pip install pyinstaller --no-binary pyinstaller
          python -m pip install Pillow tkinterdnd2 pefile yara-python
          python -m pip install -e .

      - name: Verify custom bootloader
        shell: pwsh
        run: |
          $bl = python -c "from PyInstaller import __main__; import os, PyInstaller; print(os.path.join(os.path.dirname(PyInstaller.__file__), 'bootloader'))"
          Write-Host "Bootloader directory: $bl"
          python -c "import PyInstaller; print('PyInstaller', PyInstaller.__version__)"

      - name: Stamp version info
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $ver = "${{ steps.version.outputs.VERSION }}"
          $parts = $ver.Split('.')
          $major = $parts[0]; $minor = $parts[1]; $patch = $parts[2]
          $quad = "$major, $minor, $patch, 0"
          $dotQuad = "$major.$minor.$patch.0"
          foreach ($f in @("scripts/version_info_cli.py", "scripts/version_info_gui.py")) {
            (Get-Content $f) `
              -replace 'filevers=\(\d+,\s*\d+,\s*\d+,\s*\d+\)', "filevers=($quad)" `
              -replace 'prodvers=\(\d+,\s*\d+,\s*\d+,\s*\d+\)', "prodvers=($quad)" `
              -replace "FileVersion', u'[^']+", "FileVersion', u'$dotQuad" `
              -replace "ProductVersion', u'[^']+", "ProductVersion', u'$dotQuad" |
              Set-Content $f
          }
          (Get-Content scripts/hashguard.manifest) `
            -replace 'version="\d+\.\d+\.\d+\.\d+"', "version=`"$dotQuad`"" |
            Set-Content scripts/hashguard.manifest

      - name: Build executables
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          cd scripts
          Write-Host "--- Building GUI ---"
          python -m PyInstaller hashguard-gui.spec
          if ($LASTEXITCODE -ne 0) { throw "GUI build failed (exit code $LASTEXITCODE)" }
          Write-Host "--- Building CLI ---"
          python -m PyInstaller hashguard-cli.spec
          if ($LASTEXITCODE -ne 0) { throw "CLI build failed (exit code $LASTEXITCODE)" }
          Write-Host "--- Build output ---"
          Get-ChildItem dist -Recurse -Depth 1 | Format-Table FullName, Length

      - name: Merge into single distribution
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          cd scripts
          $merged = "dist\HashGuard"
          if (Test-Path $merged) { Remove-Item $merged -Recurse -Force }

          if (-not (Test-Path "dist\hashguard-gui")) {
            Write-Host "ERROR: dist\hashguard-gui not found"
            Get-ChildItem dist -ErrorAction SilentlyContinue | Format-Table Name
            throw "GUI build output missing"
          }

          Move-Item "dist\hashguard-gui" $merged

          if (Test-Path "dist\hashguard\hashguard.exe") {
            Copy-Item "dist\hashguard\hashguard.exe" "$merged\" -Force
          }

          Get-ChildItem "dist\hashguard" -ErrorAction SilentlyContinue | ForEach-Object {
            $dest = Join-Path $merged $_.Name
            if (-not (Test-Path $dest)) {
              Copy-Item $_.FullName $dest -Recurse -Force
            }
          }

          Write-Host "Merged distribution contents:"
          Get-ChildItem $merged | Format-Table Name, Length

      - name: Build portable package
        shell: pwsh
        run: |
          cd scripts
          Compress-Archive -Path "dist\HashGuard" -DestinationPath "HashGuard-${{ steps.version.outputs.VERSION }}-portable.zip" -Force

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          echo "C:\Program Files (x86)\NSIS" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH

      - name: Build installer
        shell: pwsh
        run: |
          cd scripts
          Copy-Item ..\assets\branding\hashguard.ico . -Force
          makensis /DVERSION=${{ steps.version.outputs.VERSION }} /DDISTDIR=dist\HashGuard hashguard-installer.nsi

      - name: Generate SHA256 checksums
        shell: pwsh
        run: |
          cd scripts
          $files = @(
            "HashGuard-${{ steps.version.outputs.VERSION }}-portable.zip",
            "HashGuard-App-${{ steps.version.outputs.VERSION }}.exe"
          )
          $out = @()
          foreach ($f in $files) {
            if (Test-Path $f) {
              $h = Get-FileHash $f -Algorithm SHA256
              $out += "$($h.Hash)  $(Split-Path $f -Leaf)"
            }
          }
          $out | Set-Content SHA256SUMS.txt -Encoding ascii

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hashguard-windows-release
          path: |
            scripts/HashGuard-*-portable.zip
            scripts/HashGuard-App-*.exe
            scripts/SHA256SUMS.txt

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          body: |
            ## Installation

            | File | Description |
            |------|-------------|
            | `HashGuard-App-${{ steps.version.outputs.VERSION }}.exe` | Windows installer (recommended) |
            | `HashGuard-${{ steps.version.outputs.VERSION }}-portable.zip` | Portable ZIP (extract and run) |

            Verify downloads with `SHA256SUMS.txt`.
          files: |
            scripts/HashGuard-${{ steps.version.outputs.VERSION }}-portable.zip
            scripts/HashGuard-App-${{ steps.version.outputs.VERSION }}.exe
            scripts/SHA256SUMS.txt
