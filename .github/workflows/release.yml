name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v1.0.4)"
        required: true

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = if ("${{ github.event.inputs.tag }}") { "${{ github.event.inputs.tag }}" } else { "${{ github.ref_name }}" }
          $ver = $tag -replace '^v',''
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: windows-pip-release-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            windows-pip-release-

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # Build PyInstaller from source to compile a fresh bootloader.
          # The pre-built bootloader binary is widely fingerprinted by AV engines;
          # compiling from C source on the runner produces a unique signature.
          python -m pip install pyinstaller --no-binary pyinstaller
          # Install all runtime dependencies first
          python -m pip install pefile yara-python
          python -m pip install scikit-learn joblib psutil requests pyzipper
          python -m pip install fastapi "uvicorn[standard]" python-multipart jinja2 aiofiles
          # Optional deps that may fail on Windows without C build tools
          python -m pip install ppdeep 2>$null; $true
          # Install the hashguard package itself (--no-deps: deps already installed above)
          python -m pip install --no-deps .
          # Verify the package is importable
          python -c "import hashguard; print(f'hashguard {hashguard.__version__} OK')"

      - name: Verify custom bootloader
        shell: pwsh
        run: |
          $bl = python -c "from PyInstaller import __main__; import os, PyInstaller; print(os.path.join(os.path.dirname(PyInstaller.__file__), 'bootloader'))"
          Write-Host "Bootloader directory: $bl"
          python -c "import PyInstaller; print('PyInstaller', PyInstaller.__version__)"

      - name: Stamp version info
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $ver = "${{ steps.version.outputs.VERSION }}"
          $parts = $ver.Split('.')
          $major = $parts[0]; $minor = $parts[1]; $patch = $parts[2]
          $quad = "$major, $minor, $patch, 0"
          $dotQuad = "$major.$minor.$patch.0"
          foreach ($f in @("scripts/version_info_cli.py")) {
            (Get-Content $f) `
              -replace 'filevers=\(\d+,\s*\d+,\s*\d+,\s*\d+\)', "filevers=($quad)" `
              -replace 'prodvers=\(\d+,\s*\d+,\s*\d+,\s*\d+\)', "prodvers=($quad)" `
              -replace "FileVersion', u'[^']+", "FileVersion', u'$dotQuad" `
              -replace "ProductVersion', u'[^']+", "ProductVersion', u'$dotQuad" |
              Set-Content $f
          }
          (Get-Content scripts/hashguard.manifest) `
            -replace 'version="\d+\.\d+\.\d+\.\d+"', "version=`"$dotQuad`"" |
            Set-Content scripts/hashguard.manifest

      - name: Build executables
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          cd scripts
          $env:PYTHONPATH = (Resolve-Path ..\src).Path
          Write-Host "PYTHONPATH=$env:PYTHONPATH"
          Write-Host "--- Building CLI ---"
          python -m PyInstaller hashguard-cli.spec
          if ($LASTEXITCODE -ne 0) { throw "CLI build failed (exit code $LASTEXITCODE)" }
          Write-Host "--- Build output ---"
          Get-ChildItem dist -Recurse -Depth 2 | Format-Table FullName, Length

      - name: Merge into single distribution
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          cd scripts

          if (-not (Test-Path "dist\hashguard")) {
            Write-Host "ERROR: dist\hashguard not found"
            Get-ChildItem dist -ErrorAction SilentlyContinue | Format-Table Name
            throw "CLI build output missing"
          }

          # Rename to PascalCase (NTFS supports case-only renames via cmd)
          cmd /c ren "dist\hashguard" "HashGuard"

          Write-Host "Distribution contents:"
          Get-ChildItem "dist\HashGuard" | Format-Table Name, Length

      - name: Build portable package
        shell: pwsh
        run: |
          cd scripts
          Compress-Archive -Path "dist\HashGuard" -DestinationPath "HashGuard-${{ steps.version.outputs.VERSION }}-portable.zip" -Force

      - name: Install NSIS
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $nsisDir = "C:\Program Files (x86)\NSIS"

          # 1) Check if NSIS is already on the runner
          if (Test-Path "$nsisDir\makensis.exe") {
            Write-Host "NSIS already installed at $nsisDir"
          } else {
            # 2) Install via Chocolatey with retry (CDN can be flaky)
            $installed = $false
            for ($i = 1; $i -le 3; $i++) {
              Write-Host "Installing NSIS via Chocolatey (attempt $i/3)..."
              choco install nsis -y --no-progress 2>&1 | Write-Host
              if (Test-Path "$nsisDir\makensis.exe") { $installed = $true; break }
              Start-Sleep -Seconds 15
            }

            # 3) Fallback: download portable ZIP and extract
            if (-not $installed) {
              Write-Host "Chocolatey failed – downloading NSIS portable ZIP..."
              $zip = "$env:TEMP\nsis.zip"
              Invoke-WebRequest `
                -Uri "https://downloads.sourceforge.net/project/nsis/NSIS%203/3.10/nsis-3.10.zip" `
                -OutFile $zip -UseBasicParsing -MaximumRedirection 10
              Expand-Archive -Path $zip -DestinationPath "$env:TEMP\nsis-extract" -Force
              $extracted = Get-ChildItem "$env:TEMP\nsis-extract" -Directory | Select-Object -First 1
              New-Item -Path $nsisDir -ItemType Directory -Force | Out-Null
              Copy-Item "$($extracted.FullName)\*" $nsisDir -Recurse -Force
            }

            if (-not (Test-Path "$nsisDir\makensis.exe")) {
              throw "NSIS installation failed after all attempts"
            }
          }

          Write-Host "makensis.exe verified at $nsisDir"
          echo $nsisDir | Out-File -Append -Encoding utf8 $env:GITHUB_PATH

      - name: Build installer
        shell: pwsh
        run: |
          cd scripts
          Copy-Item ..\assets\branding\hashguard.ico . -Force
          makensis /DVERSION=${{ steps.version.outputs.VERSION }} /DDISTDIR=dist\HashGuard hashguard-installer.nsi

      - name: Generate SHA256 checksums
        shell: pwsh
        run: |
          cd scripts
          $files = @(
            "HashGuard-${{ steps.version.outputs.VERSION }}-portable.zip",
            "HashGuard-App-${{ steps.version.outputs.VERSION }}.exe"
          )
          $out = @()
          foreach ($f in $files) {
            if (Test-Path $f) {
              $h = Get-FileHash $f -Algorithm SHA256
              $out += "$($h.Hash)  $(Split-Path $f -Leaf)"
            }
          }
          $out | Set-Content SHA256SUMS.txt -Encoding ascii

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hashguard-windows-release
          path: |
            scripts/HashGuard-*-portable.zip
            scripts/HashGuard-App-*.exe
            scripts/SHA256SUMS.txt

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          body: |
            ## Installation

            | File | Description |
            |------|-------------|
            | `HashGuard-App-${{ steps.version.outputs.VERSION }}.exe` | Windows installer (recommended) |
            | `HashGuard-${{ steps.version.outputs.VERSION }}-portable.zip` | Portable ZIP (extract and run) |

            Verify downloads with `SHA256SUMS.txt`.
          files: |
            scripts/HashGuard-${{ steps.version.outputs.VERSION }}-portable.zip
            scripts/HashGuard-App-${{ steps.version.outputs.VERSION }}.exe
            scripts/SHA256SUMS.txt
